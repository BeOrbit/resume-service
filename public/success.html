<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — ResumeAI</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f4ff; margin: 0; }
    .box { background: white; border-radius: 20px; padding: 48px; text-align: center; max-width: 400px; box-shadow: 0 8px 32px rgba(99,102,241,0.12); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1e1b4b; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 24px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎉</div>
    <h1>Payment successful!</h1>
    <p>Redirecting you back to generate your resume...</p>
    <div class="spinner"></div>
  </div>
  <script>
    // Get session_id from URL and redirect back to main page with it
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (sessionId) {
      setTimeout(() => {
        window.location.href = '/?session_id=' + sessionId;
      }, 1500);
    } else {
      window.location.href = '/';
    }
  </script>
</body>
</html>
